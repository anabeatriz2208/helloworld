name: BC CI Pipeline

on:
  pull_request:
    branches: [ dev ]
  pull_request_review:
    types: [submitted]

jobs:

  build:
    if: github.event.review.state == 'approved' || github.event_name == 'pull_request'
    runs-on: windows-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install BcContainerHelper
        shell: pwsh
        run: |
          Install-Module BcContainerHelper -Force

      - name: Determine BC Artifact
        shell: pwsh
        run: |
          $artifactUrl = Get-BCArtifactUrl -type Sandbox -country w1 -select Latest
          echo "artifactUrl=$artifactUrl" >> $env:GITHUB_ENV

      - name: Create BC Docker Container
        shell: pwsh
        run: |
          $containerName = "bc-ci"

          New-BcContainer `
            -accept_eula `
            -containerName $containerName `
            -artifactUrl $env:artifactUrl `
            -auth UserPassword `
            -updateHosts `
            -includeAL `
            -assignPremiumPlan `
            -memoryLimit 8G

      - name: Compile AL App
        shell: pwsh
        run: |

          Compile-AppInBCContainer `
            -containerName bc-ci `
            -appProjectFolder ${{ github.workspace }} `
            -appOutputFolder ${{ github.workspace }}/output `
            -failOn error

      - name: Publish and Install Extension
        shell: pwsh
        run: |

          $app = Get-ChildItem ./output/*.app

          Publish-BcContainerApp `
            -containerName bc-ci `
            -appFile $app `
            -sync `
            -install

      - name: Run Tests
        shell: pwsh
        run: |

          Run-TestsInBcContainer `
            -containerName bc-ci `
            -credential (Get-Credential) `
            -testSuite DEFAULT

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bc-extension
          path: output/*.app
